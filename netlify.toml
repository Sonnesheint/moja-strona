[build]
  publish = "."

[[redirects]]
  from = "/cv"
  to   = "/cv-piotr-dudzinski.pdf"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options     = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy     = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.pdf"
  [headers.values]
    Content-Disposition = "inline"
